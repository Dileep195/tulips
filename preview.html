<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pink Tulips For You 🌷</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffe6f2,#ffd6eb);
font-family:Arial, sans-serif;
overflow:hidden;
}

.container{
text-align:center;
animation:fadeIn 2s ease;
}

h1{
color:#c2185b;
margin-bottom:20px;
}

.bouquet{
width:380px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.message{
margin-top:20px;
font-size:20px;
color:#880e4f;
line-height:1.6;
}

/* floating petals */

.petal{
position:absolute;
top:-50px;
width:12px;
height:16px;
background:#ff7fbf;
border-radius:50%;
opacity:0.7;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.9)}
to{opacity:1; transform:scale(1)}
}

</style>
</head>

<body>

<div class="container">

<h1>For You 🌷</h1>

<img class="bouquet"
src="https://images.unsplash.com/photo-1520637736862-4d197d17c90a"
alt="Pink Tulip Bouquet">

<div class="message">
If I could send real tulips through the screen, I would…<br>
until then, let this little bouquet bloom just for you 🌷
</div>

</div>

<script>

for(let i=0;i<20;i++){

let petal=document.createElement("div");
petal.classList.add("petal");

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";
petal.style.opacity=Math.random();

document.body.appendChild(petal);

}

</script>

</body>
</html>
