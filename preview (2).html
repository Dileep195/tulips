<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You 🌷</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#ffd9ea,#ffeaf3);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
overflow:hidden;
}

.container{
width:90%;
max-width:380px;
}

h1{
color:#c2185b;
font-size:28px;
margin-bottom:18px;
}

.bouquet{
width:100%;
height:320px;
object-fit:cover;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.message{
margin-top:18px;
font-size:18px;
color:#880e4f;
line-height:1.6;
}

/* petals */

.petal{
position:fixed;
top:-20px;
width:10px;
height:14px;
background:#ff7fbf;
border-radius:50%;
opacity:0.8;
animation:fall linear infinite;
}

@keyframes fall{

0%{
transform:translateY(-20px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

</style>

</head>

<body>

<div class="container">

<h1>For You 🌷</h1>

<img class="bouquet" src="tulips.png">

<div class="message">
If I could send real tulips through the screen, I would…<br><br>
until then, let this little bouquet bloom just for you 🌷
</div>

</div>

<script>

for(let i=0;i<18;i++){

let petal=document.createElement("div");
petal.classList.add("petal");

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(6+Math.random()*4)+"s";

document.body.appendChild(petal);

}

</script>

</body>
</html>
